<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indiamart Auto-Refresh</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header-bar">
      <div class="status-indicator" id="statusIndicator" aria-label="Status"></div>
      <div class="countdown" id="countdown" aria-label="Refresh countdown"></div>
      <a class="header-icon" href="#" id="settingsIcon" aria-label="Settings" title="Settings">⚙</a>
    </header>
    <h1>Auto-Refresh</h1>

    <section class="section">
      <h2>Refresh interval</h2>
      <div class="row">
        <label>
          <span>Minutes</span>
          <input type="number" id="intervalMin" min="0" max="59" value="0">
        </label>
        <label>
          <span>Seconds</span>
          <input type="number" id="intervalSec" min="0" max="59" value="10">
        </label>
      </div>
    </section>

    <section class="section">
      <h2>Criteria (leave blank to skip)</h2>

      <div class="field">
        <label>Time passed (max) – show only orders newer than</label>
        <div class="row">
          <label>
            <span>Minutes</span>
            <input type="number" id="criteriaTimeMin" min="0" max="59" value="15">
          </label>
          <label>
            <span>Seconds</span>
            <input type="number" id="criteriaTimeSec" min="0" max="59" value="0">
          </label>
        </div>
      </div>

      <div class="field">
        <label for="criteriaQty">Quantity</label>
        <div class="row">
          <select id="criteriaQtyOp">
            <option value="at_least">At least</option>
            <option value="exactly">Exactly</option>
            <option value="at_most">At most</option>
          </select>
          <input type="number" id="criteriaQty" min="0" value="50" placeholder="e.g. 50">
        </div>
      </div>

      <div class="field">
        <label for="criteriaOrderValue">Probable Order Value – minimum (e.g. 20000)</label>
        <input type="number" id="criteriaOrderValue" min="0" value="30000" placeholder="e.g. 20000">
      </div>
    </section>

    <section class="actions">
      <button id="btnStart" class="btn btn-primary">Start</button>
      <button id="btnStop" class="btn btn-secondary">Stop</button>
    </section>

    <p id="status" class="status">Stopped</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
